apiVersion: actions.summerwind.dev/v1alpha1
kind: RunnerDeployment
metadata:
  name: foodgram-runner
  namespace: actions-runner-system
spec:
  replicas: 1
  template:
    spec:
      repository: grestedjesko/foodgramdeploy
      serviceAccountName: foodgram-runner
      labels:
        - self-hosted
        - foodgram
      dockerEnabled: true
      dockerdWithinRunnerContainer: true
      resources:
        requests:
          cpu: 250m
          memory: 512Mi
        limits:
          cpu: "2"
          memory: 2Gi
