apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "locust.fullname" . }}-locustfile
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "locust.labels" . | nindent 4 }}
data:
  locustfile.py: |
    import random
    import threading
    import requests as _requests
    from locust import HttpUser, task, between

    TEST_USER_EMAIL = "testuser@example.com"
    TEST_USER_PASSWORD = "testpassword123"

    # Shared token: authenticate once, reuse across all users to avoid
    # hammering the CPU-heavy PBKDF2 hasher on every user spawn.
    _token_lock = threading.Lock()
    _shared_token = None

    class FoodgramUser(HttpUser):
        wait_time = between(1, 3)

        def on_start(self):
            global _shared_token
            with _token_lock:
                if _shared_token is None:
                    resp = self.client.post(
                        "/api/auth/token/login/",
                        json={"email": TEST_USER_EMAIL, "password": TEST_USER_PASSWORD},
                        name="/api/auth/token/login/",
                    )
                    if resp.status_code == 200:
                        _shared_token = resp.json().get("auth_token")
            self._token = _shared_token

        def _auth_headers(self):
            if self._token:
                return {"Authorization": f"Token {self._token}"}
            return {}

        @task(5)
        def list_recipes(self):
            self.client.get("/api/recipes/", name="/api/recipes/")

        @task(3)
        def list_ingredients(self):
            self.client.get("/api/ingredients/", name="/api/ingredients/")

        @task(2)
        def list_users(self):
            self.client.get(
                "/api/users/",
                headers=self._auth_headers(),
                name="/api/users/",
            )

        @task(2)
        def get_recipe(self):
            recipe_id = random.randint(1, 20)
            with self.client.get(
                f"/api/recipes/{recipe_id}/",
                name="/api/recipes/[id]/",
                catch_response=True,
            ) as resp:
                if resp.status_code == 404:
                    resp.success()

        @task(1)
        def search_ingredients(self):
            query = random.choice(["salt", "sugar", "oil", "milk", "egg"])
            self.client.get(
                f"/api/ingredients/?name={query}",
                name="/api/ingredients/?name=",
            )

        @task(1)
        def me(self):
            self.client.get(
                "/api/users/me/",
                headers=self._auth_headers(),
                name="/api/users/me/",
            )
