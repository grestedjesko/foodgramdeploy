apiVersion: v2
name: foodgram
description: Foodgram application (werf)
type: application
version: 1.0.0
appVersion: "1.0.0"
dependencies:
  - name: backend
    version: "1.0.0"
    repository: "file://../foodgram-chart/charts/backend"
    condition: backend.enabled
  - name: frontend
    version: "1.0.0"
    repository: "file://../foodgram-chart/charts/frontend"
    condition: frontend.enabled
  - name: postgresql
    version: "1.0.0"
    repository: "file://../foodgram-chart/charts/postgresql"
    condition: postgresql.enabled
  - name: rabbitmq
    version: "1.0.0"
    repository: "file://../foodgram-chart/charts/rabbitmq"
    condition: rabbitmq.enabled
  - name: redis
    version: "1.0.0"
    repository: "file://../foodgram-chart/charts/redis"
    condition: redis.enabled
  - name: celery
    version: "1.0.0"
    repository: "file://../foodgram-chart/charts/celery"
    condition: celery.enabled
  - name: flower
    version: "1.0.0"
    repository: "file://../foodgram-chart/charts/flower"
    condition: flower.enabled
